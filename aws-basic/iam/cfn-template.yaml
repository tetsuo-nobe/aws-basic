AWSTemplateFormatVersion: "2010-09-09"
Description: IAM Handson Environment Setup Template

# ==================================================
# Parameters
# ==================================================
Parameters:
  UserPassword:
    Type: String
    Description: Console sign-in password for IAM users
    NoEcho: true
    MinLength: 8

  S3BucketPrefix:
    Type: String
    Description: S3 bucket name prefix (e.g. tnobe0000-)
    Default: tnobe0000-

# ==================================================
# Resources
# ==================================================
Resources:

  # ------------------------------------------------
  # IAM Policies
  # ------------------------------------------------
  AllMostReadOnlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: allmost-readonly-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllMostReadOnlyAccess
            Effect: Allow
            Action:
              - apigateway:GET
              - autoscaling:Describe*
              - cloudformation:List*
              - cloudfront:Get*
              - cloudfront:List*
              - cloudwatch:Describe*
              - cloudwatch:Get*
              - cloudwatch:List*
              - dynamodb:BatchGet*
              - dynamodb:Describe*
              - dynamodb:Get*
              - dynamodb:List*
              - dynamodb:Query
              - dynamodb:Scan
              - ec2:Describe*
              - ec2:Get*
              - elasticloadbalancing:Describe*
              - events:Describe*
              - events:List*
              - iam:Get*
              - iam:List*
              - kinesis:Describe*
              - kinesis:Get*
              - kinesis:List*
              - kms:Describe*
              - kms:Get*
              - kms:List*
              - lambda:Get*
              - lambda:List*
              - logs:Describe*
              - logs:Get*
              - logs:FilterLogEvents
              - logs:StartQuery
              - logs:StopQuery
              - logs:TestMetricFilter
              - rds:Describe*
              - rds:List*
              - s3:Get*
              - s3:List*
              - sqs:List*
              - ssm:Describe*
              - ssm:Get*
              - ssm:List*
              - sts:GetCallerIdentity
              - tag:Get*
            Resource: "*"

  S3HandsonPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: s3-handson-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3BucketOperationsWithPrefix
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:PutEncryptionConfiguration
            Resource: !Sub "arn:aws:s3:::${S3BucketPrefix}*"
          - Sid: AllowS3ObjectOperationsWithPrefix
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::${S3BucketPrefix}*/*"

  # ------------------------------------------------
  # IAM Groups
  # ------------------------------------------------
  DemoGroup1:
    Type: AWS::IAM::Group
    Properties:
      GroupName: demo-group1
      ManagedPolicyArns:
        - !Ref AllMostReadOnlyPolicy

  DemoGroup2:
    Type: AWS::IAM::Group
    Properties:
      GroupName: demo-group2
      ManagedPolicyArns:
        - !Ref AllMostReadOnlyPolicy
        - !Ref S3HandsonPolicy

  # ------------------------------------------------
  # IAM Users
  # ------------------------------------------------
  DemoUser1:
    Type: AWS::IAM::User
    Properties:
      UserName: demo-user1
      LoginProfile:
        Password: !Ref UserPassword
        PasswordResetRequired: false
      Groups:
        - !Ref DemoGroup1

  DemoUser2:
    Type: AWS::IAM::User
    Properties:
      UserName: demo-user2
      LoginProfile:
        Password: !Ref UserPassword
        PasswordResetRequired: false
      Groups:
        - !Ref DemoGroup2

# ==================================================
# Outputs
# ==================================================
Outputs:
  ConsoleSignInUrl:
    Description: Management Console sign-in URL
    Value: !Sub "https://${AWS::AccountId}.signin.aws.amazon.com/console"

  DemoUser1Name:
    Description: Demo user 1 name
    Value: !Ref DemoUser1

  DemoUser2Name:
    Description: Demo user 2 name
    Value: !Ref DemoUser2

  AllMostReadOnlyPolicyArn:
    Description: AllMostReadOnly policy ARN
    Value: !Ref AllMostReadOnlyPolicy

  S3HandsonPolicyArn:
    Description: S3 handson policy ARN
    Value: !Ref S3HandsonPolicy
