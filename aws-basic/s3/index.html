<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 Handson - Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d1b2a, #1b2838, #232f3e);
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 背景のパーティクル */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(255, 153, 0, 0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* ヘッダー */
    .header {
      text-align: center;
      padding: 60px 20px 30px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: 2.8em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ff9900, #ffcc66, #ff9900);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 200% center; }
    }

    .header p {
      font-size: 1.2em;
      color: #8899aa;
    }

    /* S3 バケットアイコン */
    .bucket-icon {
      width: 120px;
      height: 120px;
      margin: 30px auto;
      position: relative;
      z-index: 1;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .bucket-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 10px 30px rgba(255, 153, 0, 0.3));
    }

    /* カードセクション */
    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 24px;
      padding: 20px 40px 60px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      width: 280px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      cursor: default;
      opacity: 0;
      transform: translateY(40px);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(255, 153, 0, 0.15);
      border-color: rgba(255, 153, 0, 0.4);
    }

    .card-number {
      display: inline-block;
      background: linear-gradient(135deg, #ff9900, #ffcc66);
      color: #0d1b2a;
      font-weight: bold;
      font-size: 1.4em;
      width: 44px;
      height: 44px;
      line-height: 44px;
      text-align: center;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .card h3 {
      font-size: 1.2em;
      margin-bottom: 10px;
      color: #ff9900;
    }

    .card p {
      font-size: 0.95em;
      color: #8899aa;
      line-height: 1.6;
    }

    /* タイマー */
    .timer-section {
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .timer {
      font-size: 1.1em;
      color: #8899aa;
    }

    .timer span {
      color: #ff9900;
      font-weight: bold;
      font-size: 1.3em;
    }

    /* フッター */
    .footer {
      text-align: center;
      padding: 30px;
      color: #556677;
      font-size: 0.85em;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- 背景パーティクル -->
  <div class="particles" id="particles"></div>

  <!-- ヘッダー -->
  <div class="header">
    <h1>Amazon S3 Handson</h1>
    <p>S3 バケットからこのページが配信されています</p>
  </div>

  <!-- S3 バケットアイコン -->
  <div class="bucket-icon">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="25" rx="38" ry="12" fill="#3F8624" />
      <path d="M12 25 v50 c0 6.6 17 12 38 12 s38-5.4 38-12 v-50" fill="#6CAE3E" />
      <ellipse cx="50" cy="75" rx="38" ry="12" fill="#6CAE3E" opacity="0.6" />
      <ellipse cx="50" cy="50" rx="38" ry="12" fill="none" stroke="#3F8624" stroke-width="1.5" opacity="0.5" />
      <ellipse cx="50" cy="25" rx="38" ry="12" fill="#8CC63F" />
    </svg>
  </div>

  <!-- カード -->
  <div class="cards">
    <div class="card">
      <div class="card-number">1</div>
      <h3>バケット作成</h3>
      <p>グローバルで一意な名前を付けて S3 バケットを作成しました。</p>
    </div>
    <div class="card">
      <div class="card-number">2</div>
      <h3>オブジェクト配置</h3>
      <p>この HTML ファイルをバケットにアップロードしました。</p>
    </div>
    <div class="card">
      <div class="card-number">3</div>
      <h3>アクセス設定</h3>
      <p>署名付き URL またはパブリックアクセスでこのページを閲覧しています。</p>
    </div>
  </div>

  <!-- タイマー -->
  <div class="timer-section">
    <div class="timer">
      このページを開いてから <span id="elapsed">0</span> 秒経過しました
    </div>
  </div>

  <!-- フッター -->
  <div class="footer">
    Powered by Amazon S3
  </div>

  <script>
    // パーティクル生成
    (function createParticles() {
      var container = document.getElementById('particles');
      for (var i = 0; i < 30; i++) {
        var particle = document.createElement('div');
        particle.className = 'particle';
        var size = Math.random() * 6 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
        particle.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    })();

    // カードのフェードインアニメーション
    (function animateCards() {
      var cards = document.querySelectorAll('.card');
      cards.forEach(function(card, index) {
        setTimeout(function() {
          card.classList.add('visible');
        }, 300 * (index + 1));
      });
    })();

    // 経過時間タイマー
    (function startTimer() {
      var start = Date.now();
      var el = document.getElementById('elapsed');
      setInterval(function() {
        var seconds = Math.floor((Date.now() - start) / 1000);
        el.textContent = seconds;
      }, 1000);
    })();
  </script>

</body>
</html>
